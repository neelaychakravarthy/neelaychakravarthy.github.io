<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Neelay Chakravarthy — AI Engineer</title>
    <meta
      name="description"
      content="Neelay Chakravarthy — AI Engineer building agentic AI, MCP servers, and full-stack systems. Selected work and projects."
    />
    <meta property="og:title" content="Neelay Chakravarthy — AI Engineer" />
    <meta property="og:description" content="AI Engineer · Agentic AI & Full-Stack. Selected work and projects." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://neelaychakravarthy.github.io/portfolio.html" />
    <meta property="og:image" content="https://neelaychakravarthy.github.io/og-image.jpg" />
    <meta name="twitter:card" content="summary_large_image" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap"
      rel="stylesheet"
    />

    <!-- Apply the saved theme before first paint to avoid a dark→light flash. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('portfolio-theme');
          if (t === 'light' || t === 'dark') document.documentElement.dataset.theme = t;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <!-- The whole page is rendered from public/world.json by portfolio.ts, so it
         stays in sync with the 3D world: add a biome + a hub pad and it shows up
         here automatically. This is just the mount point + a no-JS fallback. -->
    <main id="page" aria-busy="true">
      <noscript>
        <p style="padding: 2rem; font-family: sans-serif">
          This portfolio needs JavaScript. View the source projects on
          <a href="https://github.com/neelaychakravarthy">GitHub</a>.
        </p>
      </noscript>
    </main>
    <script type="module" src="/src/portfolio/portfolio.ts"></script>
  </body>
</html>
